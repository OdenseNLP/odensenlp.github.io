{% assign person = include.person %}
<div class="member-links" aria-label="Profile links">

    </a>
  {% else %}
    <span class="member-link is-disabled" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M3 6.75A1.75 1.75 0 0 1 4.75 5h14.5A1.75 1.75 0 0 1 21 6.75v10.5A1.75 1.75 0 0 1 19.25 19H4.75A1.75 1.75 0 0 1 3 17.25V6.75Zm1.8-.25 7.2 5.76 7.2-5.76H4.8Zm14.7 11V8.42l-6.81 5.45a1.1 1.1 0 0 1-1.38 0L4.5 8.42v9.08c0 .28.22.5.5.5h14c.28 0 .5-.22.5-.5Z"/></svg>

  {% else %}
    <span class="member-link is-disabled" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M12 .7a11.3 11.3 0 0 0-3.57 22.02c.56.1.76-.24.76-.53v-1.88c-3.1.67-3.75-1.32-3.75-1.32-.5-1.27-1.24-1.6-1.24-1.6-1-.69.08-.67.08-.67 1.13.08 1.72 1.15 1.72 1.15 1 .1 1.68-.72 2.07-1.13.1-.72.4-1.2.72-1.47-2.48-.28-5.08-1.24-5.08-5.53 0-1.22.44-2.21 1.15-2.99-.12-.29-.5-1.43.12-2.98 0 0 .93-.3 3.05 1.14a10.58 10.58 0 0 1 5.56 0c2.11-1.44 3.04-1.14 3.04-1.14.63 1.55.24 2.69.12 2.98.72.78 1.15 1.77 1.15 2.99 0 4.3-2.61 5.24-5.1 5.52.41.35.77 1.03.77 2.09v3.1c0 .29.2.64.77.53A11.3 11.3 0 0 0 12 .7Z"/></svg>

  {% endif %}

  {% if person.linkedin %}
    <a class="member-link" href="{{ person.linkedin }}" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn profile" title="LinkedIn">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.25 8.5A1.75 1.75 0 1 0 6.25 5a1.75 1.75 0 0 0 0 3.5ZM4.9 9.9h2.7V19H4.9V9.9Zm4.45 0h2.58v1.24h.04c.36-.68 1.23-1.4 2.52-1.4 2.7 0 3.2 1.7 3.2 3.92V19h-2.7v-4.72c0-1.12-.02-2.56-1.64-2.56-1.64 0-1.9 1.18-1.9 2.47V19h-2.7V9.9Z"/></svg>

    </span>
  {% endif %}

    <a class="member-link" href="{{ person.scholar }}" target="_blank" rel="noopener noreferrer" aria-label="Google Scholar profile" title="Scholar">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3 9 4.5-9 4.5L3 7.5 12 3Zm-6 8.1V15c0 1.66 2.69 3 6 3s6-1.34 6-3v-3.9L12 14l-6-2.9Z"/></svg>
    </a>
  {% else %}
    <span class="member-link is-disabled" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="m12 3 9 4.5-9 4.5L3 7.5 12 3Zm-6 8.1V15c0 1.66 2.69 3 6 3s6-1.34 6-3v-3.9L12 14l-6-2.9Z"/></svg>
