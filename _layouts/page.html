---
layout: default
---
<section class="container {% if page.container == 'wide' %}container-wide{% endif %} section page-section">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {% if page.lead %}
      <p class="lead">{{ page.lead }}</p>
    {% endif %}
  </header>
  <div class="{% if page.wide %}content-wide{% else %}prose{% endif %}">
    {{ content }}
  </div>
</section>
